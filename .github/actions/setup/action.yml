name: Set up build environment
description: >
  Tauri Linux system dependencies, Node with npm cache, Rust stable with a
  cargo cache — the shared prelude of every CI job that touches the app.

inputs:
  rust-components:
    description: Extra rustup components to install (comma separated)
    required: false
    default: ""

runs:
  using: composite
  steps:
    # Tauri 2 prerequisites for Linux — https://tauri.app/start/prerequisites/
    - name: Install system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          build-essential \
          file \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libssl-dev \
          libwebkit2gtk-4.1-dev \
          libxdo-dev \
          patchelf

    - uses: actions/setup-node@v7
      with:
        node-version: lts/*
        cache: npm

    - name: Install npm dependencies
      shell: bash
      run: npm ci

    - uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.rust-components }}

    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: ./src-tauri -> target
