version: 2

# Weekly dependency bumps. Everything that is not a major version arrives as a
# single grouped PR per ecosystem, so CI runs once and review stays cheap;
# majors come separately because they need a look.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore
      include: scope
    groups:
      cargo-minor-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
      include: scope
    groups:
      actions:
        patterns: ["*"]
